# Use BUILD_ID for image tag (always set for both local submit and repo triggers).
# COMMIT_SHA is only set when build is triggered from a repo, so it's empty on "gcloud builds submit".
# Required when the build trigger uses a custom service_account: use Cloud Logging only (no bucket).
options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build Docker image (region: Singapore = asia-southeast1)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/pharma-dms-490207/dms-backend/backend:$BUILD_ID'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/pharma-dms-490207/dms-backend/backend:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/pharma-dms-490207/dms-backend/backend:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/pharma-dms-490207/dms-backend/backend:latest'

  # Deploy to Cloud Run (Singapore)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dms-backend'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/pharma-dms-490207/dms-backend/backend:$BUILD_ID'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Secrets from Secret Manager (created via gcloud secrets create ...)
      - '--set-secrets'
      - >-
        DATABASE_URL=DATABASE_URL:latest,
        JWT_SECRET=JWT_SECRET:latest,
        SMTP_HOST=SMTP_HOST:latest,
        SMTP_PORT=SMTP_PORT:latest,
        SMTP_USER=SMTP_USER:latest,
        SMTP_PASSWORD=SMTP_PASSWORD:latest,
        EMAIL_FROM=EMAIL_FROM:latest,
        EMAIL_FROM_NAME=EMAIL_FROM_NAME:latest,
        FILE_STORAGE_PATH=FILE_STORAGE_PATH:latest,
        DOCUMENT_EDITOR_SERVICE_URL=DOCUMENT_EDITOR_SERVICE_URL:latest,
        CORS_ORIGIN=CORS_ORIGIN:latest